name: Continuous Integration

###############################################################################
# Triggers | Events
###############################################################################
on:
    pull_request:
    # push:  --> This causes a redundancy. only running during the PR phase is fine.
    #     branches:
    #         - main
    # workflow_dispatch: --> Not needed.

###############################################################################
# Default permissions (Principle of Least Privilege)
###############################################################################
permissions:
    contents: read

###############################################################################
# Global environment variables
###############################################################################
env:
    PYTHON_VERSION: "3.12"

###############################################################################
# Cancel older runs for the same branch
###############################################################################
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

###############################################################################
# Jobs
###############################################################################
jobs:
    ###########################################################################
    # Lint
    ###########################################################################
    lint:
        name: Lint & Format
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - uses: ./.github/workflows/actions/setup-python
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Run Ruff
              run: |
                  ruff check .

            - name: Check formatting
              run: |
                  black --check .

    ###########################################################################
    # Tests
    ###########################################################################
    test:
        name: Unit Tests
        runs-on: ubuntu-latest
        timeout-minutes: 15

        needs:
            - lint

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - uses: ./.github/workflows/actions/setup-python
              with:
                python-version: ${{ env.PYTHON_VERSION }}

            - name: Run Tests
              run: |
                  pytest \
                    --cov=app \
                    --cov-report=xml \
                    --junitxml=test-results.xml \
                    -v

            - name: Upload Test Reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-reports
                  path: |
                      test-results.xml
                      coverage.xml

    ###########################################################################
    # Docker Build
    ###########################################################################
    docker:
        name: Build Docker Image
        runs-on: ubuntu-latest
        timeout-minutes: 20

        needs:
            - test

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: false
                  tags: fastapi-app:ci

                  cache-from: type=gha
                  cache-to: type=gha,mode=max
